<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>daterangepicker</title>
  <link rel="icon" href="data:,">
  <script type="importmap">
    {
      "imports": {
        "jquery": "/node_modules/jquery/dist-module/jquery.module.min.js",
        "luxon": "/node_modules/luxon/build/es6/luxon.mjs",
        "daterangepicker": "/dist/esm/daterangepicker.js"
      }
    }
  </script>
  <link rel="stylesheet" type="text/css" href="css/daterangepicker.css" />

  <script type="module">
    import { $, jQuery } from 'jquery';
    window.$ = window.jQuery = jQuery; // needed for daterangepicker

    import { DateTime } from 'luxon';
    import { daterangepicker } from 'daterangepicker';

    $('#picker').daterangepicker({
      startDate: DateTime.now(),
      timePicker: true
    });
    $('#picker').trigger('click');

  </script>
</head>

<body>
  <div>
    <input type="text" id="picker" size="30" />
  </div>
</body>

</html>
