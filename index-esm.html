<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>daterangepicker</title>
  <link rel="icon" href="data:,">
  <script type="importmap">
    {
      "imports": {
        "luxon": "/node_modules/luxon/build/es6/luxon.mjs",
        "daterangepicker": "/dist/esm/daterangepicker.js"
      }
    }
  </script>
  <link rel="stylesheet" type="text/css" href="css/daterangepicker.css" />

  <script type="module">
    import { DateTime } from 'luxon';
    import { daterangepicker } from 'daterangepicker';

    const input = daterangepicker('#picker', {
      startDate: DateTime.now(),
      timePicker: true,
      singleDatePicker: true,
    });
    input.click();

  </script>
</head>

<body>
  <div>
    <input type="text" id="picker" size="30" />
  </div>
</body>

</html>
